services:
  db:
    image: pgvector/pgvector:pg16
    container_name: docintel-db
    environment:
      # local dev credentials only — real ones come from env in deploy
      POSTGRES_USER: docintel
      POSTGRES_PASSWORD: docintel
      POSTGRES_DB: docintel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docintel -d docintel"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    container_name: docintel-api
    env_file:
      - ./backend/.env
    environment:
      # override .env: inside the compose network the DB host is "db", not localhost
      DATABASE_URL: postgresql+asyncpg://docintel:docintel@db:5432/docintel
      ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: docintel-frontend
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  pgdata: